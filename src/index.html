<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exodus Project Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;600&display=swap');
:root {
  --bg: #0b0f14; --surface: #131920; --surface-hover: #1a2230;
  --border: #243040; --border-subtle: #1a2230;
  --text: #e8edf2; --text-muted: #8a97a8; --text-faint: #4a5568;
  --green: #8bf0c7; --green-solid: #16a34a; --green-hover: #2ea043;
  --blue: #7aa2ff; --blue-solid: #2563eb;
  --score-low: #f85149; --score-mid: #d29922; --score-high: #8bf0c7;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text-muted); line-height: 1.5;
  padding: 2rem 1rem;
}
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
.container { max-width: 1200px; margin: 0 auto; }
header { margin-bottom: 1.5rem; position: relative; }
header h1 { font-size: 2rem; color: var(--text); margin-bottom: 0.5rem; font-weight: 800; }
header p { color: var(--text-muted); max-width: 600px; }
.header-right {
  position: absolute; top: 0; right: 0;
  display: flex; align-items: center; gap: 0.75rem;
}
.cta-add {
  display: inline-block;
  padding: 0.45rem 1rem; font-size: 0.8rem; font-weight: 600;
  background: var(--green-solid); color: #fff; border-radius: 6px;
  transition: background 0.15s;
}
.cta-add:hover { background: var(--green-hover); text-decoration: none; }
.header-brand {
  display: flex; align-items: center; gap: 0.4rem;
  font-size: 0.75rem; color: var(--text-faint);
}
.header-brand a { color: var(--text-muted); }
.header-brand img { height: 20px; border-radius: 3px; }

/* Controls */
.controls {
  display: flex; flex-wrap: wrap; gap: 0.75rem;
  margin-bottom: 1.5rem; align-items: center;
}
.controls select, .controls input, .controls button {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.875rem;
  font-family: inherit;
}
.controls select:focus, .controls input:focus { outline: none; border-color: var(--blue); }
.reset-btn {
  cursor: pointer; transition: border-color 0.15s, color 0.15s;
}
.reset-btn:hover { border-color: var(--blue); color: var(--blue); }
.reset-btn.active { border-color: var(--score-mid); color: var(--score-mid); }
#search { min-width: 200px; }
#count { color: var(--text-muted); font-size: 0.875rem; margin-left: auto; }

/* Howto bar */
.howto-bar {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
  margin-bottom: 1.5rem; padding: 0.75rem 1rem;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
}
.howto-bar .howto-label {
  font-size: 0.8rem; color: var(--text-muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  align-self: center; margin-right: 0.25rem;
}
.howto-bar a {
  font-size: 0.8rem; padding: 0.25rem 0.6rem;
  background: var(--surface-hover); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); transition: background 0.15s;
}
.howto-bar a:hover { background: var(--border); border-color: var(--blue); text-decoration: none; }

/* Stats bar */
.stats-bar {
  display: flex; flex-wrap: wrap; gap: 1.5rem; align-items: center;
  margin-bottom: 1rem; padding: 0.625rem 1rem;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  font-size: 0.8rem; color: var(--text-muted);
}
.stat { display: flex; align-items: baseline; gap: 0.3rem; }
.stat-num { font-size: 1.1rem; font-weight: 800; color: var(--text); font-family: 'JetBrains Mono', monospace; }
.stat-label { font-size: 0.7rem; color: var(--text-faint); }
.stat-bar { display: flex; gap: 1px; align-items: flex-end; height: 20px; }
.stat-bar-seg { width: 4px; border-radius: 1px; min-height: 1px; transition: height 0.3s; }
.stat-trend {
  font-size: 0.7rem; font-weight: 700; margin-left: 0.25rem;
  font-family: 'JetBrains Mono', monospace;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1rem;
}

/* Card */
.card {
  background: var(--surface); border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border); transition: border-color 0.2s, box-shadow 0.2s;
  cursor: pointer; position: relative;
}
.card:hover { border-color: var(--blue); box-shadow: 0 2px 12px rgba(122,162,255,0.08); }

.card-body {
  padding: 1rem; display: flex; flex-direction: column;
  height: 100%; min-height: 200px;
}
.card-content { flex: 1; display: flex; flex-direction: column; }
.card-bottom {
  flex-shrink: 0; padding-top: 0.625rem;
  border-top: 1px solid var(--border-subtle); margin-top: 0.5rem;
}
.card-bottom-meta {
  display: flex; justify-content: space-between;
  font-size: 0.62rem; color: var(--text-faint);
  margin-bottom: 0.375rem; font-family: 'JetBrains Mono', monospace;
}
.card-header { display: flex; align-items: center; gap: 0.625rem; margin-bottom: 0.375rem; }
.card-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface-hover); flex-shrink: 0; display: flex;
  align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
}
.card-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.card-title {
  font-size: 0.9rem; font-weight: 600; color: var(--text);
  flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-title a { color: inherit; }
.card-title a:hover { color: var(--blue); text-decoration: none; }
.card-summary {
  font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.5rem; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-tags {
  display: flex; flex-wrap: wrap; gap: 0.25rem; margin-bottom: 0.375rem;
}
.tag {
  font-size: 0.65rem; font-weight: 500; padding: 0.1rem 0.4rem;
  border-radius: 3px; background: var(--surface-hover); color: var(--text-muted);
}
/* Shields-style chip for matrix links */
.mx-chip {
  display: inline-flex; align-items: stretch;
  font-size: 0.62rem; font-family: 'JetBrains Mono', monospace;
  border-radius: 3px; overflow: hidden;
  text-decoration: none;
  border: 1px solid var(--border);
  line-height: 1.5; max-width: 100%;
  margin-bottom: 0.25rem;
}
.mx-chip-label {
  background: var(--surface-hover);
  color: var(--text-muted);
  padding: 0.15rem 0.4rem;
  flex-shrink: 0;
  white-space: nowrap;
}
.mx-chip-value {
  background: var(--bg);
  color: var(--text);
  padding: 0.15rem 0.4rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.card-link-row .mx-chip { max-width: calc(100% - 2rem); }
.card-link-row .mx-chip-value { max-width: 100%; }
.mx-chip:hover { border-color: var(--blue); text-decoration: none; }
.mx-chip:hover .mx-chip-value { color: var(--blue); }

/* Via type colors (left label background) */
.mx-chip.via-matrix-to .mx-chip-label  { background: #1a2a1a; color: var(--green); }
.mx-chip.via-custom    .mx-chip-label  { background: #2a2516; color: var(--score-mid); }
.mx-chip.via-element-web .mx-chip-label { background: #1a2030; color: var(--blue); }
.mx-chip.via-element-io .mx-chip-label  { background: #1a2030; color: var(--blue); }
.mx-chip.via-cinny     .mx-chip-label  { background: #2a1a2a; color: #c878ff; }
.mx-chip.via-text      .mx-chip-label  { background: var(--surface-hover); color: var(--text-faint); }
.mx-chip.via-uri       .mx-chip-label  { background: #1a2a1a; color: var(--green); }

/* Source kind underline indicator */
.mx-chip.src-badge .mx-chip-label { font-weight: 700; }
.mx-chip.src-text .mx-chip-label { font-style: italic; }

.card-link-row { display: flex; flex-wrap: wrap; gap: 0.25rem; align-items: center; }
.card-link-more { font-size: 0.62rem; color: var(--text-faint); padding: 0 0.25rem; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 100;
  align-items: center; justify-content: center; padding: 1rem;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative;
}
.modal-accent { height: 4px; border-radius: 12px 12px 0 0; }
.modal-body { padding: 1.5rem; }
.modal-close {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 1.25rem; line-height: 1; padding: 0.25rem;
}
.modal-close:hover { color: var(--text); }
.modal-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
.modal-avatar { width: 48px; height: 48px; border-radius: 8px; background: var(--surface-hover);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; font-weight: 700; color: var(--text-muted); }
.modal-avatar img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }
.modal-title { font-size: 1.25rem; font-weight: 700; color: var(--text); }
.modal-title a { color: inherit; }
.modal-title a:hover { color: var(--blue); }
.modal-score {
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 1rem; padding: 0.75rem; background: var(--bg); border-radius: 8px;
}
.modal-score-num { font-size: 1.5rem; font-weight: 800; line-height: 1; }
.modal-score-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.modal-score-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.modal-section { margin-bottom: 1rem; }
.modal-section-title {
  font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.375rem;
}
.modal-desc { font-size: 0.875rem; color: var(--text); }
.modal-channels { display: flex; flex-direction: column; gap: 0.375rem; }
.modal-link-list { display: flex; flex-direction: column; gap: 0.375rem; }
.modal-link-row {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.375rem 0.5rem; background: var(--bg); border-radius: 6px;
}
.modal-link-meta {
  font-size: 0.65rem; color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace;
  margin-left: auto;
}
.modal-channel {
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.8rem; padding: 0.375rem 0.5rem;
  background: var(--bg); border-radius: 6px;
}
.modal-channel-icon { color: var(--text-muted); width: 16px; text-align: center; font-size: 0.7rem; }
.modal-channel a { word-break: break-all; }
.modal-tracker {
  display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1rem;
  padding-top: 1rem; border-top: 1px solid var(--border-subtle); font-size: 0.8rem;
}
.modal-tracker a {
  padding: 0.35rem 0.75rem;
  background: var(--surface-hover); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); transition: border-color 0.15s;
}
.modal-tracker a:hover { border-color: var(--blue); text-decoration: none; }

/* Animated header */
.hero-question {
  font-size: 1.35rem; color: var(--text); margin-bottom: 0.75rem;
  line-height: 1.8;
}
/* Hero text slots — simple inline-block with cross-fade */
.hero-slot {
  display: inline-block; position: relative;
  vertical-align: baseline;
}
.hero-slot .hero-item {
  display: none; white-space: nowrap;
}
.hero-slot .hero-item.active {
  display: inline;
  animation: heroFadeIn 0.5s ease-out;
}
.hero-slot .hero-item.leaving {
  display: inline; position: absolute; left: 0; top: 0;
  animation: heroFadeOut 0.4s ease-in forwards;
}
@keyframes heroFadeIn {
  0%   { opacity: 0; transform: translateY(0.3em); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes heroFadeOut {
  0%   { opacity: 1; }
  100% { opacity: 0; transform: translateY(-0.3em); }
}
.hero-slot.word .hero-item    { color: var(--blue); font-weight: 600; }
.hero-slot.project .hero-item { color: var(--green); font-weight: 800; }

/* Exodus factor bar */
.exodus-bar {
  display: flex; align-items: center; gap: 0.375rem;
  margin-top: 0.5rem; font-size: 0.7rem;
}
.exodus-bar-icon {
  width: 18px; text-align: center; font-weight: 700; flex-shrink: 0;
}
.exodus-bar-icon.matrix { color: var(--green); }
.exodus-bar-track {
  flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.exodus-bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--score-low) 0%, var(--score-mid) 40%, var(--green) 100%);
  width: 0; transition: width 1s ease-out;
}
.exodus-bar-label {
  font-size: 0.65rem; color: var(--text-faint); font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  min-width: 3ch; text-align: right;
}
.card.visible .exodus-bar-fill { width: var(--score-pct); }

.loading { text-align: center; padding: 3rem; color: var(--text-muted); }
.error { text-align: center; padding: 3rem; color: var(--score-low); }

@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
  .controls { flex-direction: column; align-items: stretch; }
  #count { margin-left: 0; }
  .howto-bar { flex-direction: column; }
  .hero-question { font-size: 1.1rem; }
  .header-right { position: static; margin-bottom: 0.75rem; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-right">
      <a class="cta-add" href="https://github.com/yncyrydybyl/ex-od-us/issues/new/choose">+ Add a project</a>
      <div class="header-brand">
        <a href="https://datanauten.de"><img src="https://datanauten.de/wp-content/uploads/2022/03/cropped-DATANAUTEN_favicon_512x512-32x32.png" alt="datanauten"></a>
        <span>by</span>
        <a href="https://datanauten.de">datanauten.de</a>
      </div>
    </div>
    <h1>Exodus Project Tracker</h1>
    <div class="hero-question" id="hero">
      Where is the
      <span class="hero-slot word" id="hero-word"></span>
      room for
      <span class="hero-slot project" id="hero-project"></span>?
    </div>
    <p>Tracking the migration of open-source projects to
      <a href="https://matrix.org">Matrix</a>.
    </p>
  </header>

  <nav class="howto-bar">
    <span class="howto-label">How-to</span>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Create a room/space</a>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Set up a homeserver</a>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Moderation tools</a>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Get listed</a>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Set up bridges</a>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Bots &amp; widgets</a>
  </nav>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search projects...">
    <select id="filter-category"><option value="">All Categories</option></select>
    <select id="filter-via">
      <option value="">All Link Types</option>
      <option value="matrix.to">matrix.to</option>
      <option value="element-web">element web</option>
      <option value="element-io">element.io</option>
      <option value="custom">custom homeserver</option>
      <option value="matrix-uri">matrix: URI</option>
      <option value="plain-text">plain text only</option>
      <option value="none">no Matrix link</option>
    </select>
    <select id="sort">
      <option value="score-desc">Highest score</option>
      <option value="score-asc">Lowest score</option>
      <option value="link-quality">Best Matrix link first</option>
      <option value="created-desc">Newest first</option>
      <option value="created-asc">Oldest first</option>
      <option value="title-asc">Title A-Z</option>
      <option value="title-desc">Title Z-A</option>
      <option value="category">By Category</option>
    </select>
    <button id="reset-filters" class="reset-btn" title="Clear all filters">Reset</button>
    <span id="count"></span>
  </div>

  <div id="grid" class="grid"><div class="loading">Loading projects...</div></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-accent" id="modal-accent"></div>
    <button class="modal-close" id="modal-close">&times;</button>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const REPO = 'yncyrydybyl/ex-od-us';
const REPO_URL = `https://github.com/${REPO}`;
const DATA_URL = 'projects-slim.json';
const API_URL = `https://api.github.com/repos/${REPO}/issues`;

let allProjects = [];
let currentFiltered = [];
let trendData = [];

// ── Map slim JSON keys to full names ────────────────────────────
function unslim(p) {
  // Decompress matrix_links: short keys → full keys, derive url + label
  const matrixLinks = (p.ml || []).map(l => {
    const target = l.t || '';
    const via = l.v || '';
    let url;
    if (via === 'matrix.to' || via === 'plain-text') {
      url = `https://matrix.to/#/${target}`;
    } else if (via === 'element-web') {
      url = `https://app.element.io/#/room/${target}`;
    } else if (via === 'element-io') {
      url = `https://element.io/#/room/${target}`;
    } else if (via.startsWith('client:')) {
      url = `https://${via.slice(7)}/#/room/${target}`;
    } else if (via === 'matrix-uri') {
      const prefix = target[0] === '#' ? 'r/' : (target[0] === '@' ? 'u/' : 'space/');
      url = `matrix:${prefix}${target.slice(1)}`;
    } else {
      url = `https://matrix.to/#/${target}`;
    }
    return {
      target, kind: l.k || 'room', via, source: l.src || 'anchor',
      quality: l.q || 0, url,
    };
  });

  return {
    slug: p.s, name: p.n, description: p.d, exodus_score: p.x,
    platform: p.p, categories: p.c || [], repo: p.r, website: p.w,
    channels: { matrix_rooms: p.m || [], ...(p.ch || {}) },
    matrix_links: matrixLinks,
    status: p.st, issues: p.i || [], updated: p.u, last_scanned: p.ls,
    notes: '', community_size: '', avatar_url: '',
  };
}

// ── Load data: static JSON first, API fallback ──────────────────
async function loadProjects() {
  try {
    const res = await fetch(DATA_URL);
    if (res.ok) {
      const data = await res.json();
      // Slim format: {c: count, p: projects, trend: [...]}
      if (data.p && data.p.length > 0) {
        trendData = data.trend || [];
        return data.p.map(unslim);
      }
      // Full format fallback
      if (data.projects && data.projects.length > 0) return data.projects;
    }
  } catch (e) { /* fall through */ }

  // Fallback: GitHub Issues API
  let page = 1, issues = [];
  while (true) {
    const res = await fetch(`${API_URL}?state=open&labels=project&per_page=100&page=${page}`);
    if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
    const data = await res.json();
    if (data.length === 0) break;
    issues = issues.concat(data);
    if (data.length < 100) break;
    page++;
  }
  return issues.map(parseIssueToProject);
}

// ── Parse issue (fallback) ──────────────────────────────────────
function parseIssueToProject(issue) {
  const body = issue.body || '';
  const fields = {};
  for (const section of body.split(/^### /m).filter(Boolean)) {
    const nl = section.indexOf('\n');
    if (nl === -1) continue;
    const key = section.slice(0, nl).trim().toLowerCase();
    const val = section.slice(nl + 1).trim();
    if (val && val !== '_No response_') fields[key] = val;
  }
  const rawCats = fields['category'] || '';
  const categories = rawCats.split(',').map(c => c.trim()).filter(Boolean);
  const scoreMatch = (fields['exodus score'] || '').match(/^(\d+)/);
  const repoUrl = fields['source repository'] || '';
  let platform = 'none';
  if (/github\.com/i.test(repoUrl)) platform = 'github';
  else if (/gitlab\.com/i.test(repoUrl)) platform = 'gitlab';
  else if (/codeberg\.org/i.test(repoUrl)) platform = 'codeberg';
  else if (repoUrl) platform = 'other';

  return {
    slug: '',
    name: fields['project name'] || issue.title.replace(/^\[Project\]:\s*/, ''),
    description: fields['project description'] || fields['short summary'] || '',
    website: fields['website'] || '',
    repo: repoUrl,
    platform,
    categories,
    exodus_score: scoreMatch ? parseInt(scoreMatch[1], 10) : null,
    status: fields['migration status'] || fields['status'] || '',
    channels: {
      matrix_space: fields['matrix space'] || '',
      matrix_rooms: (fields['matrix rooms'] || '').split('\n').filter(l => l.trim()),
      discord: fields['discord'] || '',
      telegram: fields['telegram'] || '',
      slack: fields['slack'] || '',
      irc: fields['irc'] || '',
      signal: fields['signal'] || '',
      whatsapp: fields['whatsapp'] || '',
      xmpp: fields['xmpp / jabber'] || '',
      zulip: fields['zulip'] || '',
      mattermost: fields['mattermost'] || '',
      rocketchat: fields['rocket.chat'] || '',
      other: [],
    },
    issues: [issue.number],
    avatar_url: '',
    notes: fields['notes'] || '',
    updated: issue.updated_at,
    community_size: fields['estimated community size'] || '',
  };
}

// ── Derived fields ──────────────────────────────────────────────
function enrich(p) {
  // Project link
  p.projectLink = p.website || p.repo || (p.issues.length ? `${REPO_URL}/issues/${p.issues[0]}` : REPO_URL);

  // Avatar
  if (!p.avatar_url) {
    const gh = (p.repo || '').match(/github\.com\/([^/]+)/);
    const cb = (p.repo || '').match(/codeberg\.org\/([^/]+)/);
    if (gh) p.avatar_url = `https://github.com/${gh[1]}.png?size=64`;
    else if (cb) p.avatar_url = `https://codeberg.org/avatars/${cb[1]}`;
  }

  // Initials fallback
  p.name = String(p.name || p.slug || '');
  p.initials = p.name.split(/[\s-]+/).slice(0, 2).map(w => w[0] || '').join('').toUpperCase();

  // Detect primary non-Matrix platform for exodus bar
  const ch = p.channels || {};
  if (ch.discord)        p.primaryPlatform = { icon: 'D',  color: '#5865F2' };
  else if (ch.telegram)  p.primaryPlatform = { icon: 'T',  color: '#26A5E4' };
  else if (ch.slack)     p.primaryPlatform = { icon: 'S',  color: '#4A154B' };
  else if (ch.whatsapp)  p.primaryPlatform = { icon: 'W',  color: '#25D366' };
  else if (ch.signal)    p.primaryPlatform = { icon: 'Si', color: '#3A76F0' };
  else if (ch.irc)       p.primaryPlatform = { icon: '#',  color: '#8b949e' };
  else if (ch.xmpp)      p.primaryPlatform = { icon: 'X',  color: '#8b949e' };
  else if (ch.zulip)     p.primaryPlatform = { icon: 'Z',  color: '#6492FE' };
  else if (ch.mattermost)p.primaryPlatform = { icon: 'Mm', color: '#0058CC' };
  else                   p.primaryPlatform = null;

  // Detect Matrix user link (for projects with @user:server but no room)
  p.matrixUser = p.channels?.matrix_user || '';

  // Parse matrix rooms into {name, url} pairs
  p.matrixRoomsParsed = (p.channels.matrix_rooms || []).map(line => {
    line = line.replace(/^-\s*/, '').trim();
    const m = line.match(/^([^:]+):\s*(https?:\/\/.+)/);
    if (m) return { name: m[1].trim(), url: m[2].trim() };
    if (line.startsWith('http')) return { name: 'Matrix', url: line };
    if (line.includes('matrix.to')) return { name: 'Matrix', url: 'https://' + line };
    return null;
  }).filter(Boolean);

  return p;
}

// ── Shield-style chip for Matrix links ──────────────────────────
function renderChip(link) {
  const via = link.via || 'unknown';
  let viaClass, viaLabel;
  if (via === 'matrix.to')        { viaClass = 'via-matrix-to';  viaLabel = 'matrix.to'; }
  else if (via === 'element-web') { viaClass = 'via-element-web'; viaLabel = 'element web'; }
  else if (via === 'element-io')  { viaClass = 'via-element-io';  viaLabel = 'element.io'; }
  else if (via === 'cinny')       { viaClass = 'via-cinny';       viaLabel = 'cinny'; }
  else if (via === 'matrix-uri')  { viaClass = 'via-uri';         viaLabel = 'matrix:'; }
  else if (via === 'plain-text')  { viaClass = 'via-text';        viaLabel = 'text'; }
  else if (via.startsWith('client:')) {
    viaClass = 'via-custom';
    viaLabel = via.slice(7);
  } else {
    viaClass = 'via-text'; viaLabel = via;
  }
  const srcClass = `src-${link.source || 'anchor'}`;
  return `<a class="mx-chip ${viaClass} ${srcClass}" href="${esc(link.url)}" target="_blank" onclick="event.stopPropagation()" title="${esc(link.target)} via ${esc(viaLabel)} (${esc(link.source || '')})"><span class="mx-chip-label">${esc(viaLabel)}</span><span class="mx-chip-value">${esc(link.target)}</span></a>`;
}

// ── Render ──────────────────────────────────────────────────────
function renderCards(projects) {
  const grid = document.getElementById('grid');
  if (projects.length === 0) {
    grid.innerHTML = '<div class="loading">No projects match your filters.</div>';
    return;
  }
  grid.innerHTML = projects.map((p, i) => {
    const avatar = p.avatar_url
      ? `<div class="card-avatar"><img src="${esc(p.avatar_url)}" alt="" loading="lazy" onerror="this.parentElement.textContent='${esc(p.initials)}'"></div>`
      : `<div class="card-avatar">${esc(p.initials)}</div>`;

    // Tags (first 3 categories)
    const tags = p.categories.slice(0, 3).map(c => `<span class="tag">${esc(c)}</span>`).join('');

    // Top matrix link as shield-style chip
    const topLink = (p.matrix_links && p.matrix_links[0]) || null;
    const linkChip = topLink ? renderChip(topLink) : '';
    const moreLinks = (p.matrix_links && p.matrix_links.length > 1)
      ? `<span class="card-link-more">+${p.matrix_links.length - 1}</span>` : '';

    // Exodus bar
    const sc = p.exodus_score;
    const pct = sc != null ? sc * 10 : 0;
    const pp = p.primaryPlatform;
    const leftIcon = pp && sc != null && sc < 9
      ? `<span class="exodus-bar-icon" style="color:${pp.color}">${esc(pp.icon)}</span>`
      : `<span class="exodus-bar-icon" style="opacity:0">.</span>`;
    const exodusBar = sc != null ? `
      <div class="exodus-bar">
        ${leftIcon}
        <div class="exodus-bar-track"><div class="exodus-bar-fill" style="--score-pct:${pct}%"></div></div>
        <span class="exodus-bar-icon matrix">M</span>
        <span class="exodus-bar-label">${sc}/10</span>
      </div>` : `
      <div class="exodus-bar">
        <span class="exodus-bar-icon" style="opacity:0">.</span>
        <div class="exodus-bar-track"></div>
        <span class="exodus-bar-icon" style="opacity:0">.</span>
        <span class="exodus-bar-label">—</span>
      </div>`;

    const scannedTime = p.last_scanned ? timeAgo(p.last_scanned) : '—';
    const updatedTime = p.updated ? timeAgo(p.updated) : '—';

    return `
    <div class="card" data-slug="${esc(p.slug)}">
      <div class="card-body">
        <div class="card-content">
          <div class="card-header">
            ${avatar}
            <div class="card-title"><a href="${esc(p.projectLink)}" target="_blank" onclick="event.stopPropagation()">${esc(p.name)}</a></div>
          </div>
          <div class="card-summary">${esc((p.description || '').split('\n')[0].slice(0, 140))}</div>
          ${tags ? `<div class="card-tags">${tags}</div>` : ''}
          ${linkChip ? `<div class="card-link-row">${linkChip}${moreLinks}</div>` : ''}
        </div>
        <div class="card-bottom">
          <div class="card-bottom-meta">
            <span>scanned ${scannedTime}</span>
            <span>updated ${updatedTime}</span>
          </div>
          ${exodusBar}
        </div>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.card').forEach(c =>
    c.addEventListener('click', () => openModalBySlug(c.dataset.slug)));
}

// ── Modal ───────────────────────────────────────────────────────
function openModalBySlug(slug, { pushHistory = true } = {}) {
  const p = allProjects.find(x => x.slug === slug);
  if (!p) return false;
  renderModal(p);
  if (pushHistory) {
    const target = `${location.pathname}${location.search}#p/${slug}`;
    if (location.pathname + location.search + location.hash !== target) {
      history.pushState({ slug }, '', target);
    }
  }
  return true;
}

function renderModal(p) {

  document.getElementById('modal-accent').className = `modal-accent accent-${p.platform}`;
  const avatar = p.avatar_url
    ? `<div class="modal-avatar"><img src="${esc(p.avatar_url)}" alt="" onerror="this.parentElement.textContent='${esc(p.initials)}'"></div>`
    : `<div class="modal-avatar">${esc(p.initials)}</div>`;

  const sc = p.exodus_score;
  const scoreColor = sc != null ? getScoreColor(sc) : '#30363d';
  const pp = p.primaryPlatform;
  const modalLeftIcon = pp && sc != null && sc < 9
    ? `<span style="font-weight:700;color:${pp.color};font-size:0.9rem" title="${esc(pp.icon)}">${esc(pp.icon)}</span>`

    <div class="modal-score">
      ${modalLeftIcon}

        <div class="modal-score-bar">

        </div>
      </div>
      <span style="font-weight:700;color:#3fb950;font-size:0.9rem">M</span>
      <div style="font-size:0.7rem;color:#8b949e">/10</div>
    </div>` : '';

  // Channels

  const chList = [];
  if (ch.matrix_space) chList.push({icon:'M', name:'Matrix Space', url:ch.matrix_space});
  p.matrixRoomsParsed.forEach(r => chList.push({icon:'M', name:r.name, url:r.url}));
  if (ch.discord)    chList.push({icon:'D',  name:'Discord',    url:ch.discord});
  if (ch.telegram)   chList.push({icon:'T',  name:'Telegram',   url:ch.telegram});
  if (ch.slack)      chList.push({icon:'S',  name:'Slack',      url:ch.slack});
  if (ch.signal)     chList.push({icon:'Si', name:'Signal',     url:ch.signal});
  if (ch.whatsapp)   chList.push({icon:'W',  name:'WhatsApp',   url:ch.whatsapp});
  if (ch.zulip)      chList.push({icon:'Z',  name:'Zulip',      url:ch.zulip});
  if (ch.mattermost) chList.push({icon:'Mm', name:'Mattermost', url:ch.mattermost});
  if (ch.rocketchat) chList.push({icon:'R',  name:'Rocket.Chat',url:ch.rocketchat});
  if (ch.irc)        chList.push({icon:'#',  name:'IRC',        url:ch.irc.startsWith('irc://') ? ch.irc : null, text:ch.irc});
  if (ch.xmpp)       chList.push({icon:'X',  name:'XMPP',       url:ch.xmpp.startsWith('xmpp:') ? ch.xmpp : null, text:ch.xmpp});
  if (ch.other && ch.other.length) ch.other.forEach(o => chList.push({icon:'~', name:'Other', text:o}));

  const channelsHTML = chList.length ? `
    <div class="modal-section">
      <div class="modal-section-title">Channels</div>
      <div class="modal-channels">
        ${chList.map(c => `
          <div class="modal-channel">
            <span class="modal-channel-icon">${esc(c.icon)}</span>
            <strong>${esc(c.name)}</strong>
            ${c.url ? `<a href="${esc(c.url)}" target="_blank">${esc(c.url)}</a>` : ''}
            ${c.text && !c.url ? `<span style="color:#8b949e">${esc(c.text)}</span>` : ''}
          </div>`).join('')}
      </div>
    </div>` : '';

  const cats = p.categories.map(c => `<span class="badge badge-category">${esc(c)}</span>`).join(' ');
  const issueLinks = p.issues.map(n => `<a href="${REPO_URL}/issues/${n}" target="_blank">#${n}</a>`).join(' ');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-header">
      ${avatar}
      <div>
        <div class="modal-title"><a href="${esc(p.projectLink)}" target="_blank">${esc(p.name)}</a></div>
        <div style="font-size:0.8rem;color:#8b949e">
          ${p.status ? esc(p.status) : ''}
          ${p.community_size ? ` &middot; ${esc(p.community_size)}` : ''}
          &middot; Updated ${timeAgo(p.updated)}
          ${p.last_scanned ? ` &middot; Scanned ${timeAgo(p.last_scanned)}` : ''}
        </div>
      </div>
    </div>
    ${scoreSection}
    <div class="modal-section">
      <div class="modal-section-title">About</div>
      <div class="modal-desc">${esc([p.description, p.notes].filter(Boolean).join('\n\n')).replace(/\n/g, '<br>')}</div>
    </div>
    ${p.categories.length ? `<div class="modal-section"><div class="modal-section-title">Categories</div><div>${cats}</div></div>` : ''}
    ${(p.matrix_links && p.matrix_links.length) ? `
      <div class="modal-section">
        <div class="modal-section-title">Matrix Links (${p.matrix_links.length})</div>
        <div class="modal-link-list">
          ${p.matrix_links.map(l => `
            <div class="modal-link-row">
              ${renderChip(l)}
              <span class="modal-link-meta">${esc(l.kind)} &middot; ${esc(l.source)} &middot; q${l.quality}</span>
            </div>`).join('')}
        </div>
      </div>` : ''}
    ${channelsHTML}
    ${p.website ? `<div class="modal-section"><div class="modal-section-title">Website</div><a href="${esc(p.website)}" target="_blank">${esc(p.website)}</a></div>` : ''}
    ${p.repo ? `<div class="modal-section"><div class="modal-section-title">Repository</div><a href="${esc(p.repo)}" target="_blank">${esc(p.repo)}</a></div>` : ''}
    <div class="modal-tracker">
      ${issueLinks ? `<a href="${REPO_URL}/issues/${p.issues[0]}" target="_blank">View in tracker</a>` : ''}
      ${p.slug ? `<a href="${REPO_URL}/blob/main/projects/${esc(p.slug)}.md" target="_blank">Edit project file</a>` : ''}
      ${p.slug ? `<a href="#" id="modal-copy-link" data-slug="${esc(p.slug)}">Copy link</a>` : ''}

      e.preventDefault();
      const url = `${location.origin}${location.pathname}#p/${copyBtn.dataset.slug}`;
      navigator.clipboard?.writeText(url).then(() => {
        const orig = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = orig; }, 1500);
      });
    });
  }

  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal({ pushHistory = true } = {}) {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
  if (pushHistory && parsePermalinkSlug(location.hash)) {
    history.pushState(null, '', `${location.pathname}${location.search}`);
  }
}
document.getElementById('modal-close').addEventListener('click', () => closeModal());
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Permalinks ──────────────────────────────────────────────────
// Hash format: #p/<slug>. Composes with existing search-param filters
// (e.g. ?category=Chat#p/element). Hash is the source of truth for which
// project (if any) is currently open; the hash is updated on open/close
// and consulted on popstate + initial load.
function parsePermalinkSlug(hash) {
  const m = (hash || '').match(/^#p\/([\w.\-]+)$/);
  return m ? m[1] : null;
}
window.addEventListener('popstate', () => {
  const slug = parsePermalinkSlug(location.hash);
  if (slug) {
    openModalBySlug(slug, { pushHistory: false });
  } else {
    closeModal({ pushHistory: false });
  }
});

// ── Helpers ─────────────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function scoreClass(s) { return s >= 8 ? 'high' : s >= 5 ? 'mid' : 'low'; }
function getScoreColor(s) {
  return ['#da3633','#f85149','#f0883e','#d29922','#c6a832','#8aba42','#6fae52','#57a362','#3fb950','#2ea043','#238636'][Math.min(s,10)];
}
function timeAgo(d) {
  if (!d) return 'unknown';
  const ms = Date.now() - new Date(d).getTime();
  const m = Math.floor(ms/60000);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h}h ago`;
  const days = Math.floor(h/24);
  if (days < 30) return `${days}d ago`;
  return `${Math.floor(days/30)}mo ago`;
}

// ── Filter & Sort ───────────────────────────────────────────────
function matchesViaFilter(p, viaFilter) {
  if (!viaFilter) return true;
  const links = p.matrix_links || [];
  if (viaFilter === 'none') return links.length === 0;
  if (viaFilter === 'custom') return links.some(l => (l.via || '').startsWith('client:'));
  return links.some(l => l.via === viaFilter);
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const catFilter = document.getElementById('filter-category').value.toLowerCase();
  const viaFilter = document.getElementById('filter-via').value;
  const sortKey = document.getElementById('sort').value;

  // Mark reset button active if any filter is set
  const hasFilter = !!(search || catFilter || viaFilter || sortKey !== 'score-desc');
  document.getElementById('reset-filters').classList.toggle('active', hasFilter);

  let filtered = allProjects.filter(p => {
    if (catFilter && !p.categories.some(c => c.toLowerCase() === catFilter)) return false;
    if (!matchesViaFilter(p, viaFilter)) return false;
    if (search) {
      const hay = `${p.name} ${p.description} ${p.categories.join(' ')} ${p.notes}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    switch (sortKey) {
      case 'created-desc': return (b.updated||'').localeCompare(a.updated||'');
      case 'created-asc':  return (a.updated||'').localeCompare(b.updated||'');
      case 'title-asc':    return a.name.localeCompare(b.name);
      case 'title-desc':   return b.name.localeCompare(a.name);
      case 'category':     return (a.categories[0]||'').localeCompare(b.categories[0]||'');
      case 'score-desc':   return (b.exodus_score ?? -1) - (a.exodus_score ?? -1);
      case 'score-asc':    return (a.exodus_score ?? -1) - (b.exodus_score ?? -1);
      case 'link-quality': {
        const aq = (a.matrix_links?.[0]?.quality || 0) + (a.exodus_score || 0);
        const bq = (b.matrix_links?.[0]?.quality || 0) + (b.exodus_score || 0);
        return bq - aq;
      }
      default: return 0;
    }
  });

  currentFiltered = filtered;
  document.getElementById('count').textContent = `${filtered.length} project${filtered.length !== 1 ? 's' : ''}`;
  renderCards(filtered);
  observeCards();
}

function populateFilters() {
  // Categories with counts
  const catSel = document.getElementById('filter-category');
  const catCounts = {};
  allProjects.forEach(p => p.categories.forEach(c => {
    const k = c.trim();
    if (k) catCounts[k] = (catCounts[k] || 0) + 1;
  }));
  const cats = Object.keys(catCounts).sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c;
    o.textContent = `${c} (${catCounts[c]})`;
    catSel.appendChild(o);
  });

  // Via type counts
  const viaCounts = { 'matrix.to': 0, 'element-web': 0, 'element-io': 0,
                      'custom': 0, 'matrix-uri': 0, 'plain-text': 0, 'none': 0 };
  allProjects.forEach(p => {
    const links = p.matrix_links || [];
    if (links.length === 0) { viaCounts.none++; return; }
    const seen = new Set();
    links.forEach(l => {
      const v = l.via || '';
      if (v.startsWith('client:')) seen.add('custom');
      else if (viaCounts[v] !== undefined) seen.add(v);
    });
    seen.forEach(v => viaCounts[v]++);
  });
  const viaSel = document.getElementById('filter-via');
  for (const opt of viaSel.options) {
    if (opt.value && viaCounts[opt.value] !== undefined) {
      const baseLabel = opt.dataset.label || opt.textContent;
      opt.dataset.label = baseLabel;
      opt.textContent = `${baseLabel} (${viaCounts[opt.value]})`;
    }
  }
}

function syncFromURL() {
  const p = new URLSearchParams(location.search);
  if (p.get('category')) document.getElementById('filter-category').value = p.get('category');
  if (p.get('via')) document.getElementById('filter-via').value = p.get('via');
  if (p.get('sort')) document.getElementById('sort').value = p.get('sort');
  if (p.get('q')) document.getElementById('search').value = p.get('q');
}
function syncToURL() {
  const p = new URLSearchParams();
  const c = document.getElementById('filter-category').value;
  const v = document.getElementById('filter-via').value;
  const s = document.getElementById('sort').value;
  const q = document.getElementById('search').value;
  if (c) p.set('category', c);
  if (v) p.set('via', v);
  if (s !== 'score-desc') p.set('sort', s);
  if (q) p.set('q', q);
  const qs = p.toString();
  // Preserve the permalink hash if a project modal is currently open, so
  // tweaking filters/search behind an open modal doesn't drop the deeplink.
  const hash = location.hash || '';
  history.replaceState(null, '', (qs ? `?${qs}` : location.pathname) + hash);
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-category').value = '';
  document.getElementById('filter-via').value = '';
  document.getElementById('sort').value = 'score-desc';
  syncToURL();
  applyFilters();
}

// ── Init ────────────────────────────────────────────────────────
(async () => {
  try {
    const projects = await loadProjects();
    allProjects = projects.map(enrich);
    populateFilters();
    syncFromURL();
    applyFilters();
    startHeroAnimation();
    renderStats();
    // If the URL points at a specific project, open its modal. Done after
    // applyFilters so allProjects is fully populated and rendered behind it.
    const initialSlug = parsePermalinkSlug(location.hash);
    if (initialSlug) openModalBySlug(initialSlug, { pushHistory: false });
    for (const id of ['search','filter-category','filter-via','sort']) {
      document.getElementById(id).addEventListener(id === 'search' ? 'input' : 'change', () => { syncToURL(); applyFilters(); });
    }
    document.getElementById('reset-filters').addEventListener('click', resetFilters);
  } catch (err) {
    document.getElementById('grid').innerHTML =
      `<div class="error">Failed to load: ${esc(err.message)}<br>
       <small>Try refreshing. GitHub API limit: 60/hour per IP.</small></div>`;
  }
})();

// ── Hero rotation (slot-machine style) ──────────────────────────
function startHeroAnimation() {
  const words = ['chat', 'support', 'community', 'hangout', 'dev', 'discussion', 'project'];
  const wordSlot = document.getElementById('hero-word');
  const projSlot = document.getElementById('hero-project');
  if (!wordSlot || !projSlot) return;

  // Pick 15 random scored projects
  const allNames = allProjects.filter(p => p.name && p.exodus_score != null).map(p => p.name);
  if (allNames.length === 0) {
    // Fallback: show static text if no scored projects
    wordSlot.textContent = 'chat';
    projSlot.textContent = 'your project';
    return;
  }
  const names = allNames.sort(() => Math.random() - 0.5).slice(0, 15);

  function initSlot(slot, items) {
    items.forEach((t, i) => {
      const s = document.createElement('span');
      s.textContent = t;
      s.className = 'hero-item' + (i === 0 ? ' active' : '');
      slot.appendChild(s);
    });
    return { slot, items: slot.querySelectorAll('.hero-item'), count: items.length, idx: 0 };
  }

  const ws = initSlot(wordSlot, words);
  const ps = initSlot(projSlot, names);

  function rotate(state) {
    const prev = state.idx;
    state.idx = (state.idx + 1) % state.count;
    state.items[prev].className = 'hero-item leaving';
    state.items[state.idx].className = 'hero-item active';
    setTimeout(() => { state.items[prev].className = 'hero-item'; }, 400);
  }

  setInterval(() => rotate(ws), 4000);
  setTimeout(() => setInterval(() => rotate(ps), 5500), 1500);
}

// ── IntersectionObserver: animate exodus bars on scroll ─────────
function observeCards() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.2 });
  document.querySelectorAll('.card').forEach(c => observer.observe(c));
}

// ── Stats bar ───────────────────────────────────────────────────
function renderStats() {
  const bar = document.getElementById('stats-bar');
  if (!bar) return;

  const total = allProjects.length;
  const scanned = allProjects.filter(p => p.exodus_score != null).length;
  const discovered = total - scanned;
  const avg = scanned > 0 ? (allProjects.reduce((s, p) => s + (p.exodus_score || 0), 0) / scanned) : 0;
  const avgStr = scanned > 0 ? avg.toFixed(2) : '—';
  const withLinks = allProjects.filter(p => (p.matrix_links?.length || 0) > 0).length;

  // Trend indicator vs previous snapshot
  let trendIndicator = '';
  if (trendData && trendData.length >= 2) {
    const prev = trendData[trendData.length - 2].avg;
    const delta = avg - prev;
    if (Math.abs(delta) >= 0.005) {
      const arrow = delta > 0 ? '▲' : '▼';
      const color = delta > 0 ? 'var(--green)' : 'var(--score-low)';
      trendIndicator = `<span class="stat-trend" style="color:${color}" title="vs last snapshot">${arrow}${Math.abs(delta).toFixed(2)}</span>`;
    } else {
      trendIndicator = `<span class="stat-trend" style="color:var(--text-faint)" title="no change">=</span>`;
    }
  }

  // Score distribution mini-bar chart
  const dist = Array(11).fill(0);
  allProjects.forEach(p => { if (p.exodus_score != null) dist[p.exodus_score]++; });
  const maxDist = Math.max(...dist, 1);
  const barSegs = dist.map((count, i) => {
    const h = Math.max(1, Math.round(count / maxDist * 20));
    const color = getScoreColor(i);
    return `<div class="stat-bar-seg" style="height:${h}px;background:${color}" title="Score ${i}: ${count}"></div>`;
  }).join('');

  bar.innerHTML = `
    <div class="stat"><span class="stat-num">${total}</span><span class="stat-label">projects</span></div>
    <div class="stat"><span class="stat-num">${scanned}</span><span class="stat-label">scanned</span></div>
    ${discovered > 0 ? `<div class="stat"><span class="stat-num">${discovered}</span><span class="stat-label">queued</span></div>` : ''}
    <div class="stat"><span class="stat-num">${avgStr}</span><span class="stat-label">avg score</span>${trendIndicator}</div>
    <div class="stat"><span class="stat-num">${withLinks}</span><span class="stat-label">with Matrix links</span></div>
    <div class="stat-bar" title="Score distribution 0-10">${barSegs}</div>
  `;
}
</script>
