name: Enrich projects

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-writes
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # README bytes cache. Index (`data/readme-cache.json`) is in git and
      # restored by checkout; this restores the actual README text files
      # (`data/readmes/<owner>__<repo>.md`) so the next enricher run can do
      # ETag-conditional fetches and avoid re-downloading unchanged READMEs.
      # Cache key uses the index file's hash so the cache rotates whenever
      # we add new repos or update ETags.
      - name: Restore README bytes cache
        uses: actions/cache@v4
        with:
          path: data/readmes
          key: readme-bytes-${{ hashFiles('data/readme-cache.json') }}
          restore-keys: |
            readme-bytes-

      - name: Enrich projects via Sourcegraph (no GitHub API)
        run: python3 scripts/enrich-via-sourcegraph.py

      - name: Snapshot scores
        run: python3 scripts/snapshot-scores.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/ data/score-history.jsonl data/readme-cache.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: enrich projects via Sourcegraph"
            git pull --rebase origin main
            git push
          fi
