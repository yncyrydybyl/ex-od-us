name: Enrich projects

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enrich projects via Sourcegraph (no GitHub API)
        run: python3 scripts/enrich-via-sourcegraph.py

      - name: Snapshot scores
        run: python3 scripts/snapshot-scores.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/ data/score-history.jsonl
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: enrich projects via Sourcegraph"
            git push
          fi
