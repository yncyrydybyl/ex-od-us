name: Enrich projects

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-fetch all READMEs (ignore cache)'
        required: false
        default: 'false'
        type: boolean
      project:
        description: 'Only process this project slug (blank = all)'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  issues: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enrich projects with live data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ -n "${{ inputs.project }}" ]; then ARGS="$ARGS --project ${{ inputs.project }}"; fi
          python3 scripts/enrich-projects.py $ARGS

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/ data/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: enrich projects with live scanner data"
            git push
          fi
