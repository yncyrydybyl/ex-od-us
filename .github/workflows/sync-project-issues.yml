name: Sync project issues

on:
  push:
    paths:
      - 'projects/**'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create issues for new projects and sync labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sync-issues.py

      - name: Commit updated project files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Sync issue numbers into project files"
            git push
          fi
