<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exodus Project Tracker</title>
<style>
/* ── Reset & Base ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0d1117; color: #c9d1d9; line-height: 1.5;
  padding: 2rem 1rem;
}
a { color: #58a6ff; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout ────────────────────────────────────────────────────── */
.container { max-width: 1200px; margin: 0 auto; }

header { margin-bottom: 2rem; }
header h1 { font-size: 2rem; color: #f0f6fc; margin-bottom: 0.5rem; }
header p { color: #8b949e; max-width: 600px; }

/* ── Controls ──────────────────────────────────────────────────── */
.controls {
  display: flex; flex-wrap: wrap; gap: 0.75rem;
  margin-bottom: 1.5rem; align-items: center;
}
.controls select, .controls input {
  background: #161b22; border: 1px solid #30363d; color: #c9d1d9;
  padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.875rem;
}
.controls select:focus, .controls input:focus {
  outline: none; border-color: #58a6ff;
}
#search { min-width: 200px; }
#count { color: #8b949e; font-size: 0.875rem; margin-left: auto; }

/* ── Card Grid ─────────────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
}

/* ── Card ──────────────────────────────────────────────────────── */
.card {
  background: #161b22; border-radius: 8px; overflow: hidden;
  border: 1px solid #30363d; transition: border-color 0.15s;
}
.card:hover { border-color: #58a6ff; }
.card-accent { height: 4px; }
.card-body { padding: 1rem; }
.card-title {
  font-size: 1rem; font-weight: 600; color: #f0f6fc;
  margin-bottom: 0.5rem;
}
.card-title a { color: inherit; }
.card-summary { font-size: 0.875rem; color: #8b949e; margin-bottom: 0.75rem; }
.card-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
.badge {
  display: inline-block; font-size: 0.75rem; font-weight: 500;
  padding: 0.15rem 0.5rem; border-radius: 999px;
  border: 1px solid transparent;
}
.badge-category { background: #21262d; color: #c9d1d9; border-color: #30363d; }
.badge-status { background: #1f2328; color: #8b949e; border-color: #30363d; font-style: italic; }
.card-links { margin-top: 0.75rem; font-size: 0.8rem; }
.card-links a { margin-right: 0.75rem; }
.channel-text { color: #8b949e; margin-right: 0.75rem; }

/* ── Exodus Score accent & badge ───────────────────────────────── */
.score-low  { background: #f85149; color: #fff; border-color: #f85149; }
.score-mid  { background: #d29922; color: #fff; border-color: #d29922; }
.score-high { background: #3fb950; color: #fff; border-color: #3fb950; }
.accent-0  { background: #da3633; }
.accent-1  { background: #f85149; }
.accent-2  { background: #f0883e; }
.accent-3  { background: #d29922; }
.accent-4  { background: #c6a832; }
.accent-5  { background: #8aba42; }
.accent-6  { background: #6fae52; }
.accent-7  { background: #57a362; }
.accent-8  { background: #3fb950; }
.accent-9  { background: #2ea043; }
.accent-10 { background: #238636; }
.accent-none { background: #30363d; }

/* ── Loading / Error ───────────────────────────────────────────── */
.loading { text-align: center; padding: 3rem; color: #8b949e; }
.error { text-align: center; padding: 3rem; color: #f85149; }

/* ── Responsive ────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
  .controls { flex-direction: column; align-items: stretch; }
  #count { margin-left: 0; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Exodus Project Tracker</h1>
    <p>Community projects and initiatives tracked via
      <a href="https://github.com/yncyrydybyl/ex-od-us/issues">GitHub Issues</a>.
      Add a project by
      <a href="https://github.com/yncyrydybyl/ex-od-us/issues/new/choose">opening an issue</a>.
    </p>
  </header>

  <div class="controls">
    <input type="text" id="search" placeholder="Search projects...">
    <select id="filter-category">
      <option value="">All Categories</option>
    </select>
    <select id="sort">
      <option value="score-desc">Highest score</option>
      <option value="score-asc">Lowest score</option>
      <option value="created-desc">Newest first</option>
      <option value="created-asc">Oldest first</option>
      <option value="title-asc">Title A-Z</option>
      <option value="title-desc">Title Z-A</option>
      <option value="category">By Category</option>
    </select>
    <span id="count"></span>
  </div>

  <div id="grid" class="grid">
    <div class="loading">Loading projects...</div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────
const REPO = 'yncyrydybyl/ex-od-us';
const API  = `https://api.github.com/repos/${REPO}/issues`;

// ── State ───────────────────────────────────────────────────────
let allIssues = [];

// ── Fetch all open issues (paginated) ───────────────────────────
async function fetchAllIssues() {
  let page = 1;
  let issues = [];
  while (true) {
    const url = `${API}?state=open&labels=project&per_page=100&page=${page}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
    const data = await res.json();
    if (data.length === 0) break;
    issues = issues.concat(data);
    if (data.length < 100) break;
    page++;
  }
  return issues;
}

// ── Parse issue into card data ──────────────────────────────────
function parseIssue(issue) {
  // Parse structured body (issue form creates ### Header / value pairs)
  const body = issue.body || '';
  const fields = {};
  const sections = body.split(/^### /m).filter(Boolean);
  for (const section of sections) {
    const nl = section.indexOf('\n');
    if (nl === -1) continue;
    const key = section.slice(0, nl).trim().toLowerCase();
    const val = section.slice(nl + 1).trim();
    if (val && val !== '_No response_') fields[key] = val;
  }

  // Categories: free-form comma-separated from body
  const rawCats = fields['category'] || '';
  const categories = rawCats.split(',').map(c => c.trim()).filter(Boolean);

  // Parse exodus score number from the dropdown text (e.g. "7 — Matrix is primary...")
  const scoreRaw = fields['exodus score'] || '';
  const scoreMatch = scoreRaw.match(/^(\d+)/);
  const exodusScore = scoreMatch ? parseInt(scoreMatch[1], 10) : null;

  return {
    title: fields['project name'] || issue.title.replace(/^\[Project\]:\s*/, ''),
    summary: fields['project description'] || fields['short summary'] || '',
    categories,
    exodusScore,
    status: fields['migration status'] || fields['status'] || '',
    matrixRooms: fields['matrix rooms'] || '',
    matrixSpace: fields['matrix space'] || '',
    discord: fields['discord'] || '',
    telegram: fields['telegram'] || '',
    slack: fields['slack'] || '',
    irc: fields['irc'] || '',
    website: fields['website'] || '',
    repo: fields['source repository'] || '',
    notes: fields['notes'] || '',
    url: issue.html_url,
    created: issue.created_at,
    number: issue.number,
  };
}

// ── Render ──────────────────────────────────────────────────────
function renderCards(issues) {
  const grid = document.getElementById('grid');
  if (issues.length === 0) {
    grid.innerHTML = '<div class="loading">No projects match your filters.</div>';
    return;
  }
  grid.innerHTML = issues.map(p => {
    const catBadges = p.categories.map(c => `<span class="badge badge-category">${esc(c)}</span>`).join('');
    const accentClass = p.exodusScore !== null ? `accent-${p.exodusScore}` : 'accent-none';
    const scoreBadge = p.exodusScore !== null
      ? `<span class="badge score-${scoreClass(p.exodusScore)}" title="Exodus Score">${p.exodusScore}/10</span>`
      : '';
    const channels = [
      p.matrixSpace ? ['Matrix', p.matrixSpace] : null,
      p.discord ? ['Discord', p.discord] : null,
      p.telegram ? ['Telegram', p.telegram] : null,
      p.slack ? ['Slack', p.slack] : null,
      p.irc ? ['IRC', null] : null,
      p.website ? ['Web', p.website] : null,
    ].filter(Boolean);

    return `
    <div class="card">
      <div class="card-accent ${accentClass}"></div>
      <div class="card-body">
        <div class="card-title"><a href="${p.url}" target="_blank">${esc(p.title)}</a></div>
        <div class="card-summary">${esc(p.summary.split('\n')[0].slice(0, 160))}</div>
        <div class="card-meta">
          ${scoreBadge}
          ${catBadges}
          ${p.status ? `<span class="badge badge-status">${esc(p.status)}</span>` : ''}
        </div>
        ${channels.length ? `<div class="card-links">
          ${channels.map(([name, url]) => url ? `<a href="${esc(url)}" target="_blank">${esc(name)}</a>` : `<span class="channel-text">${esc(name)}</span>`).join('')}
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function scoreClass(score) {
  if (score >= 8) return 'high';
  if (score >= 5) return 'mid';
  return 'low';
}

// ── Filter & Sort ───────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const catFilter = document.getElementById('filter-category').value;
  const sortKey = document.getElementById('sort').value;

  let filtered = allIssues.filter(p => {
    if (catFilter && !p.categories.some(c => c.toLowerCase() === catFilter.toLowerCase())) return false;
    if (search) {
      const hay = `${p.title} ${p.summary} ${p.categories.join(' ')} ${p.notes}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    switch (sortKey) {
      case 'created-desc': return new Date(b.created) - new Date(a.created);
      case 'created-asc':  return new Date(a.created) - new Date(b.created);
      case 'title-asc':    return a.title.localeCompare(b.title);
      case 'title-desc':   return b.title.localeCompare(a.title);
      case 'category':     return (a.categories[0]||'').localeCompare(b.categories[0]||'');
      case 'score-desc':   return (b.exodusScore ?? -1) - (a.exodusScore ?? -1);
      case 'score-asc':    return (a.exodusScore ?? -1) - (b.exodusScore ?? -1);
      default: return 0;
    }
  });

  document.getElementById('count').textContent = `${filtered.length} project${filtered.length !== 1 ? 's' : ''}`;
  renderCards(filtered);
}

// ── Populate filter dropdown ────────────────────────────────────
function populateFilters() {
  const catSelect = document.getElementById('filter-category');
  const usedCats = [...new Set(allIssues.flatMap(p => p.categories))].sort();
  usedCats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    catSelect.appendChild(opt);
  });
}

// ── URL state ───────────────────────────────────────────────────
function syncFromURL() {
  const params = new URLSearchParams(location.search);
  if (params.get('category')) document.getElementById('filter-category').value = params.get('category');
  if (params.get('sort')) document.getElementById('sort').value = params.get('sort');
  if (params.get('q')) document.getElementById('search').value = params.get('q');
}

function syncToURL() {
  const params = new URLSearchParams();
  const cat = document.getElementById('filter-category').value;
  const sort = document.getElementById('sort').value;
  const q = document.getElementById('search').value;
  if (cat) params.set('category', cat);
  if (sort !== 'score-desc') params.set('sort', sort);
  if (q) params.set('q', q);
  const qs = params.toString();
  history.replaceState(null, '', qs ? `?${qs}` : location.pathname);
}

// ── Init ────────────────────────────────────────────────────────
(async function init() {
  try {
    const issues = await fetchAllIssues();
    allIssues = issues.map(parseIssue);
    populateFilters();
    syncFromURL();
    applyFilters();

    document.getElementById('search').addEventListener('input', () => { syncToURL(); applyFilters(); });
    document.getElementById('filter-category').addEventListener('change', () => { syncToURL(); applyFilters(); });
    document.getElementById('sort').addEventListener('change', () => { syncToURL(); applyFilters(); });
  } catch (err) {
    document.getElementById('grid').innerHTML =
      `<div class="error">Failed to load issues: ${esc(err.message)}<br>
       <small>GitHub API rate limit for unauthenticated requests: 60/hour per IP.</small></div>`;
  }
})();
</script>

</body>
</html>
