<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exodus Project Tracker</title>
<style>
/* ── Reset & Base ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0d1117; color: #c9d1d9; line-height: 1.5;
  padding: 2rem 1rem;
}
a { color: #58a6ff; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout ────────────────────────────────────────────────────── */
.container { max-width: 1200px; margin: 0 auto; }

header { margin-bottom: 1.5rem; }
header h1 { font-size: 2rem; color: #f0f6fc; margin-bottom: 0.5rem; }
header p { color: #8b949e; max-width: 600px; }

/* ── Controls ──────────────────────────────────────────────────── */
.controls {
  display: flex; flex-wrap: wrap; gap: 0.75rem;
  margin-bottom: 1.5rem; align-items: center;
}
.controls select, .controls input {
  background: #161b22; border: 1px solid #30363d; color: #c9d1d9;
  padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.875rem;
}
.controls select:focus, .controls input:focus {
  outline: none; border-color: #58a6ff;
}
#search { min-width: 200px; }
#count { color: #8b949e; font-size: 0.875rem; margin-left: auto; }

/* ── Howto Menu ────────────────────────────────────────────────── */
.howto-bar {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
  margin-bottom: 1.5rem; padding: 0.75rem 1rem;
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
}
.howto-bar .howto-label {
  font-size: 0.8rem; color: #8b949e; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  align-self: center; margin-right: 0.25rem;
}
.howto-bar a {
  font-size: 0.8rem; padding: 0.25rem 0.6rem;
  background: #21262d; border: 1px solid #30363d; border-radius: 4px;
  color: #c9d1d9; transition: background 0.15s, border-color 0.15s;
}
.howto-bar a:hover { background: #30363d; border-color: #58a6ff; text-decoration: none; }

/* ── Card Grid ─────────────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1rem;
}

/* ── Card ──────────────────────────────────────────────────────── */
.card {
  background: #161b22; border-radius: 8px; overflow: hidden;
  border: 1px solid #30363d; transition: border-color 0.15s;
  cursor: pointer; position: relative;
}
.card:hover { border-color: #58a6ff; }
.card-accent { height: 4px; }
.card-body { padding: 0.875rem 1rem; }

.card-header {
  display: flex; align-items: center; gap: 0.625rem; margin-bottom: 0.5rem;
}
.card-avatar {
  width: 32px; height: 32px; border-radius: 6px;
  background: #21262d; flex-shrink: 0;
}
.card-rank {
  position: absolute; top: 8px; right: 8px;
  font-size: 0.7rem; font-weight: 700; color: #484f58;
  background: #0d1117; border: 1px solid #21262d;
  padding: 0.1rem 0.4rem; border-radius: 4px;
}
.card-title {
  font-size: 0.95rem; font-weight: 600; color: #f0f6fc;
  flex: 1; min-width: 0;
}
.card-title a { color: inherit; }
.card-title a:hover { color: #58a6ff; text-decoration: none; }
.card-summary {
  font-size: 0.8rem; color: #8b949e; margin-bottom: 0.5rem;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-meta {
  display: flex; flex-wrap: wrap; gap: 0.375rem; align-items: center;
}
.badge {
  display: inline-block; font-size: 0.7rem; font-weight: 500;
  padding: 0.1rem 0.45rem; border-radius: 999px;
  border: 1px solid transparent;
}
.badge-category { background: #21262d; color: #c9d1d9; border-color: #30363d; }
.badge-status { background: #1f2328; color: #8b949e; border-color: #30363d; font-style: italic; }
.card-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #21262d;
  font-size: 0.7rem; color: #484f58;
}
.card-info-btn {
  background: none; border: 1px solid #30363d; color: #8b949e;
  border-radius: 50%; width: 22px; height: 22px; cursor: pointer;
  font-size: 0.7rem; font-weight: 700; line-height: 20px; text-align: center;
  transition: border-color 0.15s, color 0.15s;
}
.card-info-btn:hover { border-color: #58a6ff; color: #58a6ff; }

/* ── Score ─────────────────────────────────────────────────────── */
.score-low  { background: #f85149; color: #fff; border-color: #f85149; }
.score-mid  { background: #d29922; color: #fff; border-color: #d29922; }
.score-high { background: #3fb950; color: #fff; border-color: #3fb950; }

/* ── Platform accent colors ────────────────────────────────────── */
.accent-github   { background: #f0f6fc; }
.accent-gitlab   { background: #fc6d26; }
.accent-codeberg { background: #2185d0; }
.accent-other    { background: #8b949e; }
.accent-none     { background: #30363d; }
.badge-platform { font-size: 0.65rem; padding: 0.05rem 0.35rem; }
.badge-github   { background: #21262d; color: #f0f6fc; border-color: #30363d; }
.badge-gitlab   { background: #292029; color: #fc6d26; border-color: #fc6d26; }
.badge-codeberg { background: #1a2a3a; color: #2185d0; border-color: #2185d0; }
.badge-other    { background: #1f2328; color: #8b949e; border-color: #30363d; }

/* ── Modal ─────────────────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  align-items: center; justify-content: center;
  padding: 1rem;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #161b22; border: 1px solid #30363d; border-radius: 12px;
  max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto;
  position: relative;
}
.modal-accent { height: 4px; border-radius: 12px 12px 0 0; }
.modal-body { padding: 1.5rem; }
.modal-close {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; color: #8b949e; cursor: pointer;
  font-size: 1.25rem; line-height: 1; padding: 0.25rem;
}
.modal-close:hover { color: #f0f6fc; }

.modal-header {
  display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;
}
.modal-avatar { width: 48px; height: 48px; border-radius: 8px; background: #21262d; }
.modal-title { font-size: 1.25rem; font-weight: 700; color: #f0f6fc; }
.modal-title a { color: inherit; }
.modal-title a:hover { color: #58a6ff; }

.modal-score {
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 1rem; padding: 0.75rem;
  background: #0d1117; border-radius: 8px;
}
.modal-score-num {
  font-size: 1.5rem; font-weight: 800; line-height: 1;
}
.modal-score-bar {
  flex: 1; height: 8px; background: #21262d; border-radius: 4px; overflow: hidden;
}
.modal-score-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }

.modal-section { margin-bottom: 1rem; }
.modal-section-title {
  font-size: 0.75rem; font-weight: 600; color: #8b949e;
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 0.375rem;
}
.modal-desc { font-size: 0.875rem; color: #c9d1d9; }

.modal-channels {
  display: flex; flex-direction: column; gap: 0.375rem;
}
.modal-channel {
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.8rem; padding: 0.375rem 0.5rem;
  background: #0d1117; border-radius: 6px;
}
.modal-channel-icon { color: #8b949e; width: 16px; text-align: center; font-size: 0.7rem; }
.modal-channel a { word-break: break-all; }

.modal-tracker {
  display: flex; gap: 0.75rem; margin-top: 1rem;
  padding-top: 1rem; border-top: 1px solid #21262d;
  font-size: 0.8rem;
}
.modal-tracker a {
  padding: 0.35rem 0.75rem;
  background: #21262d; border: 1px solid #30363d; border-radius: 6px;
  color: #c9d1d9; transition: border-color 0.15s;
}
.modal-tracker a:hover { border-color: #58a6ff; text-decoration: none; }

/* ── Loading / Error ───────────────────────────────────────────── */
.loading { text-align: center; padding: 3rem; color: #8b949e; }
.error { text-align: center; padding: 3rem; color: #f85149; }

/* ── Responsive ────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
  .controls { flex-direction: column; align-items: stretch; }
  #count { margin-left: 0; }
  .howto-bar { flex-direction: column; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Exodus Project Tracker</h1>
    <p>Tracking the migration of open-source projects to
      <a href="https://matrix.org">Matrix</a>.
      <a href="https://github.com/yncyrydybyl/ex-od-us/issues/new/choose">Add a project</a>
    </p>
    <p style="font-size:0.75rem;color:#484f58;margin-top:0.5rem">a project by <a href="https://datanauten.de" style="color:#6e7681">datanauten.de</a></p>
  </header>

  <nav class="howto-bar">
    <span class="howto-label">How-to</span>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Create a room/space</a>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Set up a homeserver</a>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Moderation tools</a>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Get listed</a>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Set up bridges</a>
    <a href="https://github.com/yncyrydybyl/ex-od-us/issues/26">Bots &amp; widgets</a>
  </nav>

  <div class="controls">
    <input type="text" id="search" placeholder="Search projects...">
    <select id="filter-category">
      <option value="">All Categories</option>
    </select>
    <select id="sort">
      <option value="score-desc">Highest score</option>
      <option value="score-asc">Lowest score</option>
      <option value="created-desc">Newest first</option>
      <option value="created-asc">Oldest first</option>
      <option value="title-asc">Title A-Z</option>
      <option value="title-desc">Title Z-A</option>
      <option value="category">By Category</option>
    </select>
    <span id="count"></span>
  </div>

  <div id="grid" class="grid">
    <div class="loading">Loading projects...</div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-accent" id="modal-accent"></div>
    <button class="modal-close" id="modal-close">&times;</button>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────
const REPO = 'yncyrydybyl/ex-od-us';
const API  = `https://api.github.com/repos/${REPO}/issues`;

// ── State ───────────────────────────────────────────────────────
let allIssues = [];

// ── Fetch all open issues (paginated) ───────────────────────────
async function fetchAllIssues() {
  let page = 1;
  let issues = [];
  while (true) {
    const url = `${API}?state=open&labels=project&per_page=100&page=${page}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
    const data = await res.json();
    if (data.length === 0) break;
    issues = issues.concat(data);
    if (data.length < 100) break;
    page++;
  }
  return issues;
}

// ── Parse issue into card data ──────────────────────────────────
function parseIssue(issue) {
  const body = issue.body || '';
  const fields = {};
  const sections = body.split(/^### /m).filter(Boolean);
  for (const section of sections) {
    const nl = section.indexOf('\n');
    if (nl === -1) continue;
    const key = section.slice(0, nl).trim().toLowerCase();
    const val = section.slice(nl + 1).trim();
    if (val && val !== '_No response_') fields[key] = val;
  }

  const rawCats = fields['category'] || '';
  const categories = rawCats.split(',').map(c => c.trim()).filter(Boolean);

  const scoreRaw = fields['exodus score'] || '';
  const scoreMatch = scoreRaw.match(/^(\d+)/);
  const exodusScore = scoreMatch ? parseInt(scoreMatch[1], 10) : null;

  // Detect platform from repo URL
  const repoUrl = fields['source repository'] || '';
  let platform = 'none';
  let avatarUrl = null;
  if (/github\.com/i.test(repoUrl)) {
    platform = 'github';
    const m = repoUrl.match(/github\.com\/([^/]+)/);
    if (m) avatarUrl = `https://github.com/${m[1]}.png?size=64`;
  } else if (/gitlab\.com/i.test(repoUrl)) {
    platform = 'gitlab';
  } else if (/codeberg\.org/i.test(repoUrl)) {
    platform = 'codeberg';
    const m = repoUrl.match(/codeberg\.org\/([^/]+)/);
    if (m) avatarUrl = `https://codeberg.org/${m[1]}.png?size=64`;
  } else if (repoUrl) {
    platform = 'other';
  }

  // Try website for avatar fallback
  if (!avatarUrl) {
    const websiteUrl = fields['website'] || '';
    const wm = websiteUrl.match(/github\.com\/([^/]+)/) || websiteUrl.match(/codeberg\.org\/([^/]+)/);
    if (wm) avatarUrl = `https://github.com/${wm[1]}.png?size=64`;
  }

  const projectLink = fields['website'] || repoUrl || issue.html_url;

  // Parse matrix rooms into array of {name, url}
  const matrixRoomsRaw = fields['matrix rooms'] || '';
  const matrixRooms = matrixRoomsRaw.split('\n').map(line => {
    const m = line.match(/^([^:]+):\s*(https?:\/\/.+)/);
    if (m) return { name: m[1].trim(), url: m[2].trim() };
    const url = line.trim();
    if (url.startsWith('http')) return { name: 'Matrix', url };
    return null;
  }).filter(Boolean);

  return {
    title: fields['project name'] || issue.title.replace(/^\[Project\]:\s*/, ''),
    summary: fields['project description'] || fields['short summary'] || '',
    description: fields['description'] || fields['project description'] || '',
    categories,
    exodusScore,
    status: fields['migration status'] || fields['status'] || '',
    matrixRooms,
    matrixSpace: fields['matrix space'] || '',
    discord: fields['discord'] || '',
    telegram: fields['telegram'] || '',
    slack: fields['slack'] || '',
    irc: fields['irc'] || '',
    signal: fields['signal'] || '',
    whatsapp: fields['whatsapp'] || '',
    xmpp: fields['xmpp / jabber'] || '',
    website: fields['website'] || '',
    repo: repoUrl,
    notes: fields['notes'] || '',
    communitySize: fields['estimated community size'] || '',
    platform,
    avatarUrl,
    projectLink,
    issueUrl: issue.html_url,
    created: issue.created_at,
    updated: issue.updated_at,
    number: issue.number,
  };
}

// ── Render cards ────────────────────────────────────────────────
function renderCards(issues) {
  const grid = document.getElementById('grid');
  if (issues.length === 0) {
    grid.innerHTML = '<div class="loading">No projects match your filters.</div>';
    return;
  }
  grid.innerHTML = issues.map((p, i) => {
    const rank = i + 1;
    const catBadges = p.categories.map(c => `<span class="badge badge-category">${esc(c)}</span>`).join('');
    const accentClass = `accent-${p.platform}`;
    const platformLabel = { github: 'GitHub', gitlab: 'GitLab', codeberg: 'Codeberg', other: 'Other', none: '' }[p.platform] || '';
    const platformBadge = platformLabel ? `<span class="badge badge-platform badge-${p.platform}">${platformLabel}</span>` : '';
    const scoreBadge = p.exodusScore !== null
      ? `<span class="badge score-${scoreClass(p.exodusScore)}">${p.exodusScore}/10</span>`
      : '';
    const avatar = p.avatarUrl
      ? `<img class="card-avatar" src="${esc(p.avatarUrl)}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="card-avatar"></div>`;
    const updated = timeAgo(p.updated);

    return `
    <div class="card" data-idx="${i}">
      <div class="card-accent ${accentClass}"></div>
      <span class="card-rank">#${rank}</span>
      <div class="card-body">
        <div class="card-header">
          ${avatar}
          <div class="card-title"><a href="${esc(p.projectLink)}" target="_blank" onclick="event.stopPropagation()">${esc(p.title)}</a></div>
        </div>
        <div class="card-summary">${esc(p.summary.split('\n')[0].slice(0, 140))}</div>
        <div class="card-meta">
          ${scoreBadge}
          ${platformBadge}
          ${catBadges}
          ${p.status ? `<span class="badge badge-status">${esc(p.status)}</span>` : ''}
        </div>
        <div class="card-footer">
          <span>Updated ${updated}</span>
          <button class="card-info-btn" onclick="event.stopPropagation(); openModal(${i})" title="Details">i</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Clicking the card opens the modal
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(+card.dataset.idx));
  });
}

// ── Detail modal ────────────────────────────────────────────────
function openModal(idx) {
  const p = currentFiltered[idx];
  if (!p) return;

  document.getElementById('modal-accent').className = `modal-accent accent-${p.platform}`;

  const avatar = p.avatarUrl
    ? `<img class="modal-avatar" src="${esc(p.avatarUrl)}" alt="" onerror="this.style.display='none'">`
    : `<div class="modal-avatar"></div>`;

  // Score bar
  const scorePercent = p.exodusScore !== null ? p.exodusScore * 10 : 0;
  const scoreColor = p.exodusScore !== null ? getScoreColor(p.exodusScore) : '#30363d';
  const scoreSection = p.exodusScore !== null ? `
    <div class="modal-score">
      <div class="modal-score-num" style="color:${scoreColor}">${p.exodusScore}</div>
      <div style="flex:1">
        <div style="font-size:0.7rem;color:#8b949e;margin-bottom:0.25rem">Exodus Score</div>
        <div class="modal-score-bar">
          <div class="modal-score-fill" style="width:${scorePercent}%;background:${scoreColor}"></div>
        </div>
      </div>
      <div style="font-size:0.7rem;color:#8b949e">/10</div>
    </div>` : '';

  // Channels
  const channels = [];
  if (p.matrixSpace) channels.push({ icon: 'M', name: 'Matrix Space', url: p.matrixSpace });
  p.matrixRooms.forEach(r => channels.push({ icon: 'M', name: r.name, url: r.url }));
  if (p.discord) channels.push({ icon: 'D', name: 'Discord', url: p.discord });
  if (p.telegram) channels.push({ icon: 'T', name: 'Telegram', url: p.telegram });
  if (p.slack) channels.push({ icon: 'S', name: 'Slack', url: p.slack });
  if (p.signal) channels.push({ icon: 'Si', name: 'Signal', url: p.signal });
  if (p.whatsapp) channels.push({ icon: 'W', name: 'WhatsApp', url: p.whatsapp });
  if (p.irc) channels.push({ icon: '#', name: 'IRC', url: null, text: p.irc });
  if (p.xmpp) channels.push({ icon: 'X', name: 'XMPP', url: null, text: p.xmpp });

  const channelsHTML = channels.length ? `
    <div class="modal-section">
      <div class="modal-section-title">Channels</div>
      <div class="modal-channels">
        ${channels.map(ch => `
          <div class="modal-channel">
            <span class="modal-channel-icon">${esc(ch.icon)}</span>
            <strong>${esc(ch.name)}</strong>
            ${ch.url ? `<a href="${esc(ch.url)}" target="_blank">${esc(ch.url)}</a>` : ''}
            ${ch.text ? `<span style="color:#8b949e">${esc(ch.text)}</span>` : ''}
          </div>
        `).join('')}
      </div>
    </div>` : '';

  const catBadges = p.categories.map(c => `<span class="badge badge-category">${esc(c)}</span>`).join(' ');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-header">
      ${avatar}
      <div>
        <div class="modal-title"><a href="${esc(p.projectLink)}" target="_blank">${esc(p.title)}</a></div>
        <div style="font-size:0.8rem;color:#8b949e">
          ${p.status ? esc(p.status) : ''}
          ${p.communitySize ? ` &middot; ${esc(p.communitySize)}` : ''}
          &middot; Updated ${timeAgo(p.updated)}
        </div>
      </div>
    </div>

    ${scoreSection}

    <div class="modal-section">
      <div class="modal-section-title">About</div>
      <div class="modal-desc">${esc(p.summary).replace(/\n/g, '<br>')}</div>
    </div>

    ${p.categories.length ? `
    <div class="modal-section">
      <div class="modal-section-title">Categories</div>
      <div>${catBadges}</div>
    </div>` : ''}

    ${channelsHTML}

    ${p.website ? `
    <div class="modal-section">
      <div class="modal-section-title">Website</div>
      <a href="${esc(p.website)}" target="_blank">${esc(p.website)}</a>
    </div>` : ''}

    ${p.repo ? `
    <div class="modal-section">
      <div class="modal-section-title">Repository</div>
      <a href="${esc(p.repo)}" target="_blank">${esc(p.repo)}</a>
    </div>` : ''}

    ${p.notes ? `
    <div class="modal-section">
      <div class="modal-section-title">Notes</div>
      <div class="modal-desc">${esc(p.notes).replace(/\n/g, '<br>')}</div>
    </div>` : ''}

    <div class="modal-tracker">
      <a href="${esc(p.issueUrl)}" target="_blank">View in tracker</a>
      <a href="${esc(p.issueUrl)}#issuecomment" target="_blank">Scanner reports</a>
    </div>
  `;

  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Helpers ─────────────────────────────────────────────────────
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function scoreClass(score) {
  if (score >= 8) return 'high';
  if (score >= 5) return 'mid';
  return 'low';
}

function getScoreColor(score) {
  const colors = ['#da3633','#f85149','#f0883e','#d29922','#c6a832','#8aba42','#6fae52','#57a362','#3fb950','#2ea043','#238636'];
  return colors[Math.min(score, 10)];
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  const months = Math.floor(days / 30);
  return `${months}mo ago`;
}

// ── Filter & Sort ───────────────────────────────────────────────
let currentFiltered = [];

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const catFilter = document.getElementById('filter-category').value;
  const sortKey = document.getElementById('sort').value;

  let filtered = allIssues.filter(p => {
    if (catFilter && !p.categories.some(c => c.toLowerCase() === catFilter.toLowerCase())) return false;
    if (search) {
      const hay = `${p.title} ${p.summary} ${p.categories.join(' ')} ${p.notes}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    switch (sortKey) {
      case 'created-desc': return new Date(b.created) - new Date(a.created);
      case 'created-asc':  return new Date(a.created) - new Date(b.created);
      case 'title-asc':    return a.title.localeCompare(b.title);
      case 'title-desc':   return b.title.localeCompare(a.title);
      case 'category':     return (a.categories[0]||'').localeCompare(b.categories[0]||'');
      case 'score-desc':   return (b.exodusScore ?? -1) - (a.exodusScore ?? -1);
      case 'score-asc':    return (a.exodusScore ?? -1) - (b.exodusScore ?? -1);
      default: return 0;
    }
  });

  currentFiltered = filtered;
  document.getElementById('count').textContent = `${filtered.length} project${filtered.length !== 1 ? 's' : ''}`;
  renderCards(filtered);
}

// ── Populate filter dropdown ────────────────────────────────────
function populateFilters() {
  const catSelect = document.getElementById('filter-category');
  const usedCats = [...new Set(allIssues.flatMap(p => p.categories))].sort();
  usedCats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    catSelect.appendChild(opt);
  });
}

// ── URL state ───────────────────────────────────────────────────
function syncFromURL() {
  const params = new URLSearchParams(location.search);
  if (params.get('category')) document.getElementById('filter-category').value = params.get('category');
  if (params.get('sort')) document.getElementById('sort').value = params.get('sort');
  if (params.get('q')) document.getElementById('search').value = params.get('q');
}

function syncToURL() {
  const params = new URLSearchParams();
  const cat = document.getElementById('filter-category').value;
  const sort = document.getElementById('sort').value;
  const q = document.getElementById('search').value;
  if (cat) params.set('category', cat);
  if (sort !== 'score-desc') params.set('sort', sort);
  if (q) params.set('q', q);
  const qs = params.toString();
  history.replaceState(null, '', qs ? `?${qs}` : location.pathname);
}

// ── Init ────────────────────────────────────────────────────────
(async function init() {
  try {
    const issues = await fetchAllIssues();
    allIssues = issues.map(parseIssue);
    populateFilters();
    syncFromURL();
    applyFilters();

    document.getElementById('search').addEventListener('input', () => { syncToURL(); applyFilters(); });
    document.getElementById('filter-category').addEventListener('change', () => { syncToURL(); applyFilters(); });
    document.getElementById('sort').addEventListener('change', () => { syncToURL(); applyFilters(); });
  } catch (err) {
    document.getElementById('grid').innerHTML =
      `<div class="error">Failed to load issues: ${esc(err.message)}<br>
       <small>GitHub API rate limit for unauthenticated requests: 60/hour per IP.</small></div>`;
  }
})();
</script>
